name: Skills verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew skillsCheck :game-server:betaCheck
