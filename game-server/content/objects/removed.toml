# Global Object Removals Configuration
#
# Format:
# [[remove]]
# x = Coordinate X (or "from..to" range)
# y = Coordinate Y (or "from..to" range)
# z = Height level
# type = (Optional) The specific object type to remove.
#        If omitted, all objects at the tile are removed from both the client's view and server collision map.
# Common Types:
# - 0: Wall Straight (e.g., standard walls, doors)
# - 9: Wall Diagonal
# - 10, 11: Main interactable objects (e.g., gates, chests, bookcases)
# - 22: Floor decoration

